name: Build and Push Docker Image

on:
  workflow_dispatch:
    inputs:
      triton_commit:
        description: 'Triton commit SHA to use'
        required: false
        default: 'aafec417bded34db6308f5b3d6023daefae43905'
        type: string

env:
  DOCKERHUB_USERNAME: muhaawad
  IMAGE_NAME: iris-dev

jobs:
  build-and-push:
    runs-on: [self-hosted, mi3008x]
    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - dockerfile: ./docker/Dockerfile.rocm7.0
            base-name: "rocm7.0.2_ubuntu24.04_py3.12_pytorch_release_2.8.0"
          - dockerfile: ./docker/Dockerfile.rocm7.1
            base-name: "rocm7.1_ubuntu24.04_py3.12_pytorch_release_2.8.0"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set Triton short SHA
        id: triton
        run: |
          TRITON_COMMIT="${{ inputs.triton_commit }}"
          TRITON_SHORT="${TRITON_COMMIT:0:7}"
          echo "short_sha=${TRITON_SHORT}" >> $GITHUB_OUTPUT
          echo "full_sha=${TRITON_COMMIT}" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ secrets.IRIS_DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: ./docker
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ env.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:${{ matrix.base-name }}-triton-${{ steps.triton.outputs.short_sha }}
          build-args: |
            TRITON_COMMIT=${{ steps.triton.outputs.full_sha }}
          cache-from: type=gha,scope=${{ matrix.base-name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.base-name }}
    
    outputs:
      triton_short_sha: ${{ steps.triton.outputs.short_sha }}

  validation-test:
    name: Validation Test
    needs: build-and-push
    runs-on: [self-hosted, mi3008x]
    timeout-minutes: 30
    
    strategy:
      fail-fast: false
      matrix:
        include:
          - base-name: "rocm7.0.2_ubuntu24.04_py3.12_pytorch_release_2.8.0"
          - base-name: "rocm7.1_ubuntu24.04_py3.12_pytorch_release_2.8.0"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Pull Docker image
        run: |
          docker pull ${{ env.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:${{ matrix.base-name }}-triton-${{ needs.build-and-push.outputs.triton_short_sha }}

      - name: Run validation test
        run: |
          set -e
          
          IMAGE_TAG="${{ env.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:${{ matrix.base-name }}-triton-${{ needs.build-and-push.outputs.triton_short_sha }}"
          
          echo "::group::Running validation test in container"
          docker run --rm --network host \
            --device=/dev/kfd --device=/dev/dri \
            --ipc=host --shm-size 16G \
            --group-add video --cap-add=SYS_PTRACE \
            --security-opt seccomp=unconfined \
            -v ${{ github.workspace }}:/workspace \
            -w /workspace \
            ${IMAGE_TAG} bash -c "
              set -e
              pip install -e .
              wget -O test_iris_distributed.py https://gist.githubusercontent.com/mawad-amd/6375dc078e39e256828f379e03310ec7/raw/a527c3192bee4615292769e340b1c73676f6945a/test_iris_distributed.py
              python test_iris_distributed.py
            "
          echo "::endgroup::"
          
          echo "✅ Validation test passed for ${{ matrix.base-name }}!"

