name: Iris Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  DOCKER_IMAGE_NAME: ${{ vars.DOCKER_IMAGE_NAME || 'iris-dev-triton-aafec41' }}

jobs:
  build-container-image:
    runs-on: [self-hosted, mi3xx]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Apptainer (if not available)
        run: |
          if ! command -v apptainer &> /dev/null && ! command -v docker &> /dev/null; then
            echo "Neither Apptainer nor Docker found, installing Apptainer..."
            apt-get update && apt-get install -y software-properties-common
            add-apt-repository -y ppa:apptainer/ppa
            apt-get update && apt-get install -y apptainer
          else
            echo "Container runtime already available"
          fi

      - name: Build Iris container
        run: |
          bash .github/scripts/container_build.sh

  # Jobs grouped by GPU allocation - can run in parallel
  test-git-gpu-0-1:
    name: Test GPU 0,1 (git install)
    needs: build-container-image
    runs-on: [self-hosted, mi3xx]
    strategy:
      fail-fast: false
      matrix:
        test_dir: [examples, unittests, ccl, x, ops]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Cleanup lingering ports before tests
        run: |
          bash .github/scripts/cleanup_ports.sh

      - name: Run ${{ matrix.test_dir }} tests with 1 ranks (git install)
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_SHA: ${{ github.sha }}
        run: |
          set -e
          echo "::group::Running ${{ matrix.test_dir }} tests with 1 ranks (install: git)"
          bash .github/scripts/run_tests.sh \
            "${{ matrix.test_dir }}" \
            "1" \
            "0,1" \
            "git"
          echo "::endgroup::"
          echo "✅ ${{ matrix.test_dir }} tests with 1 ranks (git) passed!"

  test-git-gpu-2-3:
